# Workspace is the default site for this VPS. Keep the HTTPS block in this
# repository because deploy.sh installs this exact file on every deployment.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name workspace.fermat.vn _;

    root /var/www/ft-workspace/dist;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://workspace.fermat.vn$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name workspace.fermat.vn _;

    ssl_certificate /etc/letsencrypt/live/workspace.fermat.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/workspace.fermat.vn/privkey.pem;

    root /var/www/ft-workspace/dist;
    index index.html;
    client_max_body_size 5m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /var/www/ft-workspace/backend/staticfiles/;
    }

    location /uploads/ {
        alias /var/www/ft-workspace/uploads/;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /templates/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
