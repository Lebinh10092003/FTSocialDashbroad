# This is a dedicated server block for workspace.fermat.vn.
# Do not merge it into, replace, or edit the khaothi.fermat.vn server block.
server {
    listen 80;
    listen [::]:80;
    server_name workspace.fermat.vn;

    root /var/www/ft-workspace/dist;
    index index.html;
    client_max_body_size 5m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/ft-workspace/backend/staticfiles/;
    }

    location /uploads/ {
        alias /var/www/ft-workspace/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
