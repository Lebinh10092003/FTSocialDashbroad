name: Cleanup auxiliary branches once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-branches-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete every branch except main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = 'main';

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 },
            );

            const deleted = [];
            const failed = [];

            for (const branch of branches) {
              if (branch.name === defaultBranch) continue;

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                deleted.push(branch.name);
                core.info(`Deleted branch: ${branch.name}`);
              } catch (error) {
                failed.push(`${branch.name}: ${error.message}`);
                core.warning(`Could not delete ${branch.name}: ${error.message}`);
              }
            }

            await github.rest.repos.update({
              owner,
              repo,
              delete_branch_on_merge: true,
            });

            core.summary
              .addHeading('Branch cleanup')
              .addRaw(`Deleted: ${deleted.length ? deleted.join(', ') : 'none'}\n`)
              .addRaw(`Failed: ${failed.length ? failed.join(' | ') : 'none'}\n`)
              .write();

            if (failed.length) {
              core.setFailed(`Some branches could not be deleted: ${failed.join(' | ')}`);
            }
